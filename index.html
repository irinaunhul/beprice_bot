<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BePrice</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 16px;
    }
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      outline: none;
    }
    button {
      padding: 10px 16px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      font-size: 14px;
      cursor: pointer;
      background: transparent;
      color: var(--tg-theme-text-color, #000);
    }
    .tab.active {
      background: var(--tg-theme-button-color, #2481cc);
      color: white;
      border-color: transparent;
    }
    .product-card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .product-card button {
      cursor: pointer;
      border: none;
    }
    .product-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .product-price { font-size: 18px; font-weight: 700; color: #2481cc; }
    .product-old-price { font-size: 13px; color: #999; text-decoration: line-through; margin-left: 6px; }
    .product-unit { font-size: 13px; color: #999; }
    .product-store { font-size: 12px; color: #999; margin-bottom: 4px; }
    .discount-badge {
      display: inline-block;
      background: #ff3b30;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 6px;
      margin-left: 6px;
    }
    .loading { text-align: center; padding: 40px; color: #999; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .section-title {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Назва товару..." />
  <button onclick="search()">🔍</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('search', this)">Пошук</button>
  <button class="tab" onclick="switchTab('watchlist', this)">📋 Список</button>
  <button class="tab" onclick="switchTab('sales', this)">🔥 Акції</button>
</div>

<div id="content"></div>

<script>
  const API = 'https://bepricebot-production.up.railway.app';
  const tg = window.Telegram.WebApp;
  tg.expand();

  let currentTab = 'search';

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (tab === 'search') {
      document.getElementById('content').innerHTML = '';
    } else if (tab === 'watchlist') {
      showWatchlist();
    } else if (tab === 'sales') {
      showSales();
    }
  }

  async function search() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">🔍 Шукаю...</div>';

  const [silpoResults, metroResults, maudauResults] = await Promise.allSettled([
    searchSilpo(query),
    searchMetro(query),
    searchMaudau(query)
  ]);
    console.log('maudau:', maudauResults);

  content.innerHTML = '';

  if (silpoResults.status === 'fulfilled' && silpoResults.value.length) {
    content.innerHTML += `<div class="section-title">🛒 Сільпо</div>`;
    silpoResults.value.forEach(p => content.innerHTML += renderCard(p));
  }

  if (metroResults.status === 'fulfilled' && metroResults.value.length) {
    content.innerHTML += `<div class="section-title" style="margin-top:16px">🏪 Метро</div>`;
    metroResults.value.forEach(p => content.innerHTML += renderCard(p));
  }

  if (maudauResults.status === 'fulfilled' && maudauResults.value.length) {
    content.innerHTML += `<div class="section-title" style="margin-top:16px">🟡 Maudau</div>`;
    maudauResults.value.forEach(p => content.innerHTML += renderCard(p));
  }

  if (!content.innerHTML) {
    content.innerHTML = '<div class="empty">Нічого не знайдено</div>';
  }
}
  async function searchSilpo(query) {
    const res = await fetch('https://api.catalog.ecom.silpo.ua/api/2.0/exec/EcomCatalogGlobal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json;charset=UTF-8' },
      body: JSON.stringify({
        method: 'GetSimpleCatalogItems',
        data: { customFilter: query, filialId: '2405', skuPerPage: 5, pageNumber: 1 }
      })
    });
    const data = await res.json();
    return (data.items || []).map(p => ({
      name: p.name,
      unit: p.unit || '',
      price: p.price,
      oldPrice: p.oldPrice || null,
      store: 'silpo'
    }));
  }

  async function searchMetro(query) {
  const res = await fetch(`${API}/metro?q=${encodeURIComponent(query)}`);
  const data = await res.json();
  return (data.results || []).map(p => ({
    name: p.title,
    unit: p.weight ? p.weight + 'г' : '',
    price: (p.price / 100).toFixed(2),
    oldPrice: p.discount?.status ? (p.discount.old_price / 100).toFixed(2) : null,
  }));
}

  async function searchMaudau(query) {
  // Крок 1 — отримати ID товарів через автокомпліт
  const autoRes = await fetch(
  `https://backend.prod.maudau.click/v1/user/products/searches?query=${encodeURIComponent(query)}&per_page=5&locale=uk`,
  {
    headers: {
      'Accept-Language': 'uk-UA',
      'X-Language': 'uk',
      'x-app-name': 'storefront_web',
      'x-app-platform': 'android',
      'x-app-version': '1.22.5',
      'x-app-device-id': 'a98bafb1-6f3b-4e59-bb25-e0c35e950574',
      'Accept': 'application/json'
    }
  }
);
const autoData = await autoRes.json();
console.log('maudau raw:', autoData);
const items = autoData?.products || autoData?.data || autoData?.items || (Array.isArray(autoData) ? autoData : []);
return items.slice(0, 5).map(p => ({
  name: p.title || '?',
  unit: '',
  price: p.offer?.price ? (p.offer.price / 100).toFixed(2) : '?',
  oldPrice: p.offer?.old_price && p.offer.old_price !== p.offer.price
    ? (p.offer.old_price / 100).toFixed(2)
    : null,
}));
  // Крок 2 — отримати деталі з цінами
  const res = await fetch(
    `https://backend.prod.maudau.click/v1/user/products/searches?product_ids=${ids}&per_page=5`,
    {
      headers: {
        'x-app-name': 'storefront_web',
        'x-app-platform': 'android',
        'x-app-version': '1.22.5',
        'x-app-device-id': 'a98bafb1-6f3b-4e59-bb25-e0c35e950574',
        'Accept': 'application/json'
      }
    }
  );
  const data = await res.json();
  console.log('maudau item:', data[0]);
  return (data || []).map(p => ({
    name: p.name || p.title || '?',
    unit: p.unit_name || '',
    price: p.price ? (p.price / 100).toFixed(2) : '?',
    oldPrice: p.original_price ? (p.original_price / 100).toFixed(2) : null,

}

  function renderCard(p) {
    const discount = p.oldPrice && p.oldPrice != p.price
      ? `<span class="product-old-price">${p.oldPrice} грн</span><span class="discount-badge">🔥</span>`
      : '';
    return `
      <div class="product-card">
        <div class="product-name">${p.name} <span class="product-unit">${p.unit}</span></div>
        <div>
          <span class="product-price">${p.price} грн</span>
          ${discount}
        </div>
      </div>`;
  }

async function showWatchlist() {
  document.getElementById('content').innerHTML = '<div class="loading">Завантажую...</div>';
  try {
    const res = await fetch(`${API}/watched`);
    const items = await res.json();
    const content = document.getElementById('content');
    if (!items.length) {
      content.innerHTML = '<div class="empty">Список порожній</div>';
      content.innerHTML += `
        <div style="margin-top:16px">
          <input id="newItem" type="text" placeholder="Додати товар..."/>
          <button onclick="addItem()" style="width:100%;margin-top:8px">+ Додати</button>
        </div>`;
      return;
    }
    content.innerHTML = '<div class="section-title">📋 Відстежувані товари</div>';
    items.forEach(item => {
      content.innerHTML += `
        <div class="product-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span class="product-name">${item}</span>
            <button onclick="removeItem('${item}')" style="background:#ff3b30;padding:6px 10px;border-radius:8px;font-size:12px">✕</button>
          </div>
          <button onclick="searchItem('${item}')" style="width:100%;background:#f0f0f0;color:#333;padding:6px;border-radius:8px;font-size:13px">
            🔍 Перевірити ціну
          </button>
        </div>`;
    });
    content.innerHTML += `
      <div style="margin-top:16px">
        <input id="newItem" type="text" placeholder="Додати товар..."/>
        <button onclick="addItem()" style="width:100%;margin-top:8px">+ Додати</button>
      </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Помилка завантаження</div>';
  }
}

async function searchItem(item) {
  document.getElementById('searchInput').value = item;
  switchTab('search', document.querySelectorAll('.tab')[0]);
  await search();
}
async function addItem() {
  const item = document.getElementById('newItem').value.trim();
  if (!item) return;
  await fetch(`${API}/watched/add`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ item })
  });
  showWatchlist();
}

async function removeItem(item) {
  await fetch(`${API}/watched/remove`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ item })
  });
  showWatchlist();
}

  async function showSales() {
    document.getElementById('content').innerHTML = '<div class="loading">🔥 Завантажую акції...</div>';
    try {
      const res = await fetch('https://api.catalog.ecom.silpo.ua/api/2.0/exec/EcomCatalogGlobal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json;charset=UTF-8' },
        body: JSON.stringify({
          method: 'GetSimpleCatalogItems',
          data: { filialId: '2405', skuPerPage: 20, pageNumber: 1, onlyWithDiscounts: true }
        })
      });
      const data = await res.json();
      const items = data.items || [];
      const content = document.getElementById('content');
      content.innerHTML = '<div class="section-title">🔥 Акції Сільпо</div>';
      items.forEach(p => {
        content.innerHTML += renderCard({
          name: p.name, unit: p.unit || '',
          price: p.price, oldPrice: p.oldPrice
        });
      });
    } catch(e) {
      document.getElementById('content').innerHTML = '<div class="empty">Помилка завантаження</div>';
    }
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>
</body>
</html>
